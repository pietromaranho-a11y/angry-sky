<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Catálogo Profissional</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header>
      <h1>Catálogo de Produtos</h1>
    </header>

    <main class="container-principal">
      <div id="vitrine" class="grid-produtos"></div>

      <aside id="carrinho" class="carrinho-lateral">
        <h2>🛒 Meu Carrinho</h2>
        <ul id="lista-carrinho"></ul>
        <div class="footer-carrinho">
          <p>
            <strong>Total:</strong> <span id="total-carrinho">R$ 0,00</span>
          </p>
          <button class="btn-finalizar">Finalizar Pedido</button>
        </div>
      </aside>
    </main>

    <footer>
      <div style="text-align: center; padding: 20px">
        <a
          href="admin.html"
          style="text-decoration: none; color: #6366f1; font-weight: 500"
          >🔒 Área do Lojista</a
        >
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
