<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Catálogo</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header>
      <h1>Catálogo de Produtos</h1>
    </header>

    <main>
      <div id="vitrine" class="grid-produtos"></div>

      <section id="carrinho" style="margin-top: 40px; padding: 20px; background: #f9f9f9; border-radius: 8px;">
        <h2>🛒 Seu Carrinho</h2>
        <ul id="lista-carrinho" style="list-style: none; padding: 0;">
          </ul>
        <p><strong>Total: </strong><span id="total-carrinho">R$ 0,00</span></p>
      </section>
    </main>

    <footer>
      <hr style="opacity: 0.1; margin: 50px 0 20px 0" />
      <div style="text-align: center; padding-bottom: 30px">
        <a href="admin.html" style="text-decoration: none; color: #6366f1; font-size: 0.9rem; font-weight: 500;">
          🔒 Área do Lojista
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
